name: Intranet Build and Release

on:
    push:
        branches:
            - main
        tags:
            - "intranet-v*"
    pull_request:
        branches:
            - main
            - develop
    workflow_dispatch:
        inputs:
            release-type:
                description: "Choose release type"
                required: false
                default: "release"
                type: choice
                options:
                    - release
                    - pre-release

permissions:
    contents: write
    checks: write
    pull-requests: write

env:
    CLINE_INTRANET_MODE: "true"

jobs:
    quality-checks:
        runs-on: ubuntu-latest
        name: Intranet Quality Checks
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Run Quality Checks
              run: npm run ci:check-all

    build-and-test:
        needs: quality-checks
        runs-on: ubuntu-latest
        name: Intranet Build & Test
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Build Tests and Extension
              run: npm run ci:build

            - name: Unit Tests
              run: npm run test:unit

            - name: Extension Integration Tests
              run: |
                  max_attempts=3
                  for attempt in $(seq 1 $max_attempts); do
                    echo "::group::Attempt $attempt of $max_attempts"
                    if xvfb-run -a npm run test:coverage; then
                      echo "::endgroup::"
                      exit 0
                    fi
                    echo "::endgroup::"
                    if [ "$attempt" -lt "$max_attempts" ]; then
                      echo "::warning::Integration tests failed on attempt $attempt, retrying..."
                      sleep 5
                    fi
                  done
                  echo "::error::Integration tests failed after $max_attempts attempts"
                  exit 1

            - name: Webview Tests
              run: cd webview-ui && npm run test:coverage

            - name: Compile Extension
              run: npm run compile

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: intranet-extension-build
                  path: dist/

    release:
        needs: build-and-test
        runs-on: ubuntu-latest
        name: Intranet Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install root dependencies
              run: npm ci --include=optional
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci --include=optional

            - name: Install Publishing Tools
              run: npm install -g @vscode/vsce

            - name: Determine Version
              id: version
              run: |
                  BASE_VERSION=$(node -p "require('./package.json').version")
                  # Get the latest intranet release tag
                  LATEST_TAG=$(git tag -l "intranet-v*" --sort=-version:refname | head -1)
                  if [ -z "$LATEST_TAG" ]; then
                    # No previous intranet release, use base version
                    NEW_VERSION="${BASE_VERSION}"
                  else
                    PREV_VERSION="${LATEST_TAG#intranet-v}"
                    echo "Previous intranet release: $PREV_VERSION"
                    # Parse previous version
                    IFS='.' read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$PREV_VERSION"
                    # If base version changed (minor/major bump from upstream), use base version
                    IFS='.' read -r BASE_MAJOR BASE_MINOR BASE_PATCH <<< "$BASE_VERSION"
                    if [ "$BASE_MAJOR" != "$PREV_MAJOR" ] || [ "$BASE_MINOR" != "$PREV_MINOR" ]; then
                      NEW_VERSION="${BASE_VERSION}"
                    else
                      # Same major.minor, bump patch
                      NEW_PATCH=$((PREV_PATCH + 1))
                      NEW_VERSION="${PREV_MAJOR}.${PREV_MINOR}.${NEW_PATCH}"
                    fi
                  fi
                  echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=intranet-v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Releasing intranet version: $NEW_VERSION"

            - name: Package Extension
              env:
                  CLINE_INTRANET_MODE: "true"
              run: |
                  vsce package --allow-package-secrets sendgrid --out "cline-intranet-${{ steps.version.outputs.version }}.vsix"

            - name: Get Changelog Entry
              id: changelog
              run: |
                  CONTENT=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md 2>/dev/null || echo "")
                  echo "content<<EOF" >> "$GITHUB_OUTPUT"
                  echo "$CONTENT" >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"

            - name: Create Git Tag
              run: |
                  git tag "${{ steps.version.outputs.tag }}"
                  git push origin "${{ steps.version.outputs.tag }}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  files: "cline-intranet-*.vsix"
                  body: |
                      ## Intranet Mode Release `${{ steps.version.outputs.tag }}`

                      This is a special build with intranet mode enabled by default (`CLINE_INTRANET_MODE=true`).

                      ### Disabled Network Features
                      - **PostHog Analytics**: Telemetry and analytics initialization skipped
                      - **Remote Configuration**: Periodic config fetching and 1-hour polling timer disabled
                      - **Banner Service**: External banner API fetches skipped
                      - **Auth Token Refresh**: Cline account auth token refresh skipped (local models still work)
                      - **MCP Marketplace**: External marketplace API fetches skipped

                      ### What Still Works
                      - All AI conversation functionality (with local or intranet-accessible models)
                      - File operations (read, write, edit)
                      - MCP servers (local or intranet-accessible)
                      - Command execution and terminal access
                      - Code search, indexing, and task history

                      ### How to Install
                      1. Download the `.vsix` file below
                      2. In VS Code, run `Extensions: Install from VSIX...`
                      3. Select the downloaded file

                      ### Manual Activation (for non-release builds)
                      Set environment variable before launching VS Code:
                      ```bash
                      export CLINE_INTRANET_MODE=true
                      code
                      ```

                      ${{ steps.changelog.outputs.content }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
